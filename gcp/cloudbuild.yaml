# Cloud Build — Mattermost Team Edition (patched)
#
# Триггеры: теги v*-patched для latest и v*patched-dev для dev.
# Cloud Build работает нативно на linux/amd64 — QEMU не нужен.
# npm run build занимает ~8-12 мин (vs 35+ мин под QEMU на macOS).
#
# Кеширование: BuildKit registry cache сохраняется в _IMAGE_REPO:buildcache.
# При повторной сборке без изменений webapp/server переиспользуются
# промежуточные слои и cache mounts из Dockerfile.

steps:
  # ── Сборка и push образа ───────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    env:
      - 'DOCKER_BUILDKIT=1'
      - 'PIPELINE_NAME=${_PIPELINE_NAME}'
      - 'PIPELINE_PROJECT_ID=$PROJECT_ID'
      - 'PIPELINE_BUILD_ID=$BUILD_ID'
      - 'PIPELINE_CLOUDBUILD_REGION=${_CLOUDBUILD_REGION}'
      - 'PIPELINE_GITHUB_REPO=https://github.com/pilprod/mattermost'
      - 'PIPELINE_TAG=$TAG_NAME'
      - 'PIPELINE_SHORT_SHA=$SHORT_SHA'
      - 'PIPELINE_COMMIT_SHA=$COMMIT_SHA'
      - 'IMAGE_REPO=${_IMAGE_REPO}'
      - 'DEV_IMAGE_TAG=${_DEV_IMAGE_TAG}'
    entrypoint: 'bash'
    args:
      - '-ceu'
      - |
        apt-get update
        apt-get install -y ca-certificates python3 git

        pipeline_started_at="$$(date -u +%s)"
        pipeline_tag="$${PIPELINE_TAG:-manual-or-untagged}"
        pipeline_dev_image_tag="$${DEV_IMAGE_TAG:-dev}"
        pipeline_image_tag="$${PIPELINE_TAG:-manual}"
        pipeline_secondary_image_tag=""
        pipeline_push_latest="true"
        if [[ "$${pipeline_tag}" == *-dev ]]; then
          pipeline_image_tag="$${pipeline_dev_image_tag}"
          pipeline_secondary_image_tag="$${PIPELINE_TAG:-}"
          pipeline_push_latest="false"
        fi
        pipeline_github_repo="$${PIPELINE_GITHUB_REPO:-}"
        pipeline_project="$${pipeline_github_repo#https://github.com/}"
        pipeline_short_sha="$${PIPELINE_SHORT_SHA:-unknown-sha}"
        pipeline_commit_sha="$${PIPELINE_COMMIT_SHA:-$${PIPELINE_SHORT_SHA:-unknown-sha}}"
        pipeline_build_id="$${PIPELINE_BUILD_ID:-unknown-build}"
        pipeline_project_id="$${PIPELINE_PROJECT_ID:-gcloud-production-1}"
        pipeline_cloudbuild_region="$${PIPELINE_CLOUDBUILD_REGION:-southamerica-east1}"
        pipeline_name="$${PIPELINE_NAME:-Cloud Build}"
        workflow_name="mattermost image"
        if [[ -z "$${pipeline_project}" || "$${pipeline_project}" == "$${pipeline_github_repo}" ]]; then
          pipeline_project="$${pipeline_name}"
        fi
        pipeline_build_url="https://console.cloud.google.com/cloud-build/builds;region=$${pipeline_cloudbuild_region}/$${pipeline_build_id}?project=$${pipeline_project_id}"
        pipeline_workflow_id="$${pipeline_project}|$${pipeline_tag}"
        if [[ "$${pipeline_tag}" == "manual-or-untagged" ]]; then
          pipeline_workflow_id="$${pipeline_workflow_id}|$${pipeline_short_sha}"
        fi
        pipeline_tag_url=""
        if [[ -n "$${pipeline_github_repo}" && "$${pipeline_tag}" != "manual-or-untagged" ]]; then
          pipeline_tag_url="$${pipeline_github_repo}/tree/$${pipeline_tag}"
        fi
        pipeline_commit_url=""
        if [[ -n "$${pipeline_github_repo}" && "$${pipeline_short_sha}" != "unknown-sha" ]]; then
          pipeline_commit_url="$${pipeline_github_repo}/commit/$${pipeline_short_sha}"
        fi
        registry_host="$${IMAGE_REPO%%/*}"
        registry_path="$${IMAGE_REPO#*/}"
        registry_location="$${registry_host%-docker.pkg.dev}"
        registry_project_id="$${registry_path%%/*}"
        registry_path_remainder="$${registry_path#*/}"
        registry_repo_name="$${registry_path_remainder%%/*}"
        registry_image_name="$${registry_path_remainder#*/}"
        pipeline_registry_image_digest=""
        pipeline_metadata_file="/tmp/mattermost-image-$${pipeline_build_id}.json"
        pipeline_artifacts_json=""

        build_artifacts_json() {
          if [[ -z "$${pipeline_registry_image_digest}" ]]; then
            printf '{}'
            return 0
          fi

          local registry_label_tag="$${pipeline_image_tag}"
          if [[ -n "$${pipeline_secondary_image_tag}" ]]; then
            registry_label_tag="$${pipeline_secondary_image_tag}"
          fi
          local registry_label="$${registry_image_name}:$${registry_label_tag}"
          local registry_url="https://console.cloud.google.com/artifacts/docker/$${registry_project_id}/$${registry_location}/$${registry_repo_name}/$${registry_image_name}/$${pipeline_registry_image_digest}?project=$${registry_project_id}"
          CICD_IMAGE_LABEL="$${registry_label}" \
          CICD_IMAGE_URL="$${registry_url}" \
          CICD_IMAGE_REF="$${IMAGE_REPO}:$${registry_label_tag}" \
            python3 -c 'import json, os; payload = {"images": [{"label": os.environ["CICD_IMAGE_LABEL"], "url": os.environ["CICD_IMAGE_URL"], "ref": os.environ["CICD_IMAGE_REF"]}]}; print(json.dumps(payload, separators=(",", ":")))'
        }

        emit_cicd_report() {
          local stage="$$1"
          local state="$$2"
          local exit_code="$${3:-}"
          local duration_seconds="$${4:-}"
          local report_name="$${pipeline_name}"
          if [[ "$${stage}" == "workflow" ]]; then
            report_name="$${workflow_name}"
          fi
          if [[ "$${state}" != "started" ]]; then
            pipeline_artifacts_json="$$(build_artifacts_json)"
          fi
          CICD_REPORT_WORKFLOW_ID="$${pipeline_workflow_id}" \
          CICD_REPORT_WORKFLOW_NAME="$${workflow_name}" \
          CICD_REPORT_STAGE="$${stage}" \
          CICD_REPORT_STATE="$${state}" \
          CICD_REPORT_NAME="$${report_name}" \
          CICD_REPORT_PROJECT_LABEL="$${pipeline_project}" \
          CICD_REPORT_PROJECT_URL="$${pipeline_github_repo}" \
          CICD_REPORT_TAG_LABEL="$${pipeline_tag}" \
          CICD_REPORT_TAG_URL="$${pipeline_tag_url}" \
          CICD_REPORT_COMMIT_LABEL="$${pipeline_short_sha}" \
          CICD_REPORT_COMMIT_URL="$${pipeline_commit_url}" \
          CICD_REPORT_BUILD_ID="$${pipeline_build_id}" \
          CICD_REPORT_BUILD_URL="$${pipeline_build_url}" \
          CICD_REPORT_EXIT_CODE="$${exit_code}" \
          CICD_REPORT_DURATION_SECONDS="$${duration_seconds}" \
          CICD_REPORT_ARTIFACTS_JSON="$${pipeline_artifacts_json}" \
            python3 -c 'import json, os; payload = {"workflow_id": os.environ["CICD_REPORT_WORKFLOW_ID"], "workflow_name": os.environ["CICD_REPORT_WORKFLOW_NAME"], "stage": os.environ["CICD_REPORT_STAGE"], "state": os.environ["CICD_REPORT_STATE"], "name": os.environ["CICD_REPORT_NAME"], "build_id": os.environ["CICD_REPORT_BUILD_ID"], "project": {"label": os.environ["CICD_REPORT_PROJECT_LABEL"], "url": os.environ.get("CICD_REPORT_PROJECT_URL", "")}, "tag": {"label": os.environ["CICD_REPORT_TAG_LABEL"], "url": os.environ.get("CICD_REPORT_TAG_URL", "")}, "commit": {"label": os.environ["CICD_REPORT_COMMIT_LABEL"], "url": os.environ.get("CICD_REPORT_COMMIT_URL", "")}, "build": {"label": os.environ["CICD_REPORT_BUILD_ID"], "url": os.environ["CICD_REPORT_BUILD_URL"]}}; payload.update({"exit_code": int(os.environ["CICD_REPORT_EXIT_CODE"])} if os.environ.get("CICD_REPORT_EXIT_CODE") else {}); payload.update({"duration_seconds": int(os.environ["CICD_REPORT_DURATION_SECONDS"])} if os.environ.get("CICD_REPORT_DURATION_SECONDS") else {}); artifacts = json.loads(os.environ.get("CICD_REPORT_ARTIFACTS_JSON") or "{}"); payload.update({"artifacts": artifacts} if artifacts and os.environ["CICD_REPORT_STATE"] != "started" else {}); print("CICD_REPORT " + json.dumps(payload, separators=(",", ":")))'
        }

        notify_done() {
          local exit_code="$$?"
          local duration_seconds="$$(( $$(date -u +%s) - pipeline_started_at ))"

          if [[ "$${exit_code}" -eq 0 ]]; then
            emit_cicd_report "build" "succeeded" "$${exit_code}" "$${duration_seconds}"
          else
            emit_cicd_report "build" "failed" "$${exit_code}" "$${duration_seconds}"
          fi

          exit "$${exit_code}"
        }

        trap notify_done EXIT
        emit_cicd_report "workflow" "started"
        emit_cicd_report "build" "started"

        tag_args=(--tag "$${IMAGE_REPO}:$${pipeline_image_tag}")
        if [[ -n "$${pipeline_secondary_image_tag}" && "$${pipeline_secondary_image_tag}" != "$${pipeline_image_tag}" ]]; then
          tag_args+=(--tag "$${IMAGE_REPO}:$${pipeline_secondary_image_tag}")
        fi
        if [[ "$${pipeline_push_latest}" == "true" ]]; then
          tag_args+=(--tag "$${IMAGE_REPO}:latest")
        fi

        pipeline_build_date="$$(date -u +%Y-%m-%dT%H:%M:%SZ)"

        docker buildx create --name cloudbuild --use || docker buildx use cloudbuild
        docker buildx build \
          --file=Dockerfile.team-patch \
          --cache-from=type=registry,ref="$${IMAGE_REPO}:buildcache" \
          --cache-to=type=registry,ref="$${IMAGE_REPO}:buildcache",mode=max \
          --no-cache-filter=server-builder,runtime \
          --build-arg BUILD_NUMBER="$${pipeline_tag}" \
          --build-arg BUILD_HASH="$${pipeline_short_sha}" \
          --build-arg BUILD_DATE="$${pipeline_build_date}" \
          --metadata-file="$${pipeline_metadata_file}" \
          "$${tag_args[@]}" \
          --push \
          .

        if [[ -s "$${pipeline_metadata_file}" ]]; then
          pipeline_registry_image_digest="$$(python3 -c 'import json, sys; print(json.load(open(sys.argv[1])).get("containerimage.digest", ""))' "$${pipeline_metadata_file}" 2>/dev/null || true)"
        fi
    timeout: '3600s'

  - name: 'gcr.io/google.com/cloudsdktool/google-cloud-cli:alpine'
    id: 'deploy-yourown-chat'
    waitFor: ['build']
    env:
      - 'PIPELINE_TAG=$TAG_NAME'
      - 'PIPELINE_SHORT_SHA=$SHORT_SHA'
      - 'TARGET_PROJECT_ID=$PROJECT_ID'
      - 'CLOUDBUILD_REGION=${_CLOUDBUILD_REGION}'
      - 'YOUROWN_CHAT_DEPLOY_TRIGGER_ID=${_YOUROWN_CHAT_DEPLOY_TRIGGER_ID}'
      - 'YOUROWN_CHAT_DEPLOY_BRANCH=${_YOUROWN_CHAT_DEPLOY_BRANCH}'
    script: |
      #!/usr/bin/env sh
      set -eu

      pipeline_tag="${PIPELINE_TAG:-}"
      case "${pipeline_tag}" in
        v*-patched|v*patched-dev)
          ;;
        *)
          echo "Skipping yourown-chat deploy trigger for tag: ${pipeline_tag:-manual-or-untagged}"
          exit 0
          ;;
      esac

      if [ -z "${YOUROWN_CHAT_DEPLOY_TRIGGER_ID:-}" ]; then
        echo "_YOUROWN_CHAT_DEPLOY_TRIGGER_ID is empty; cannot trigger yourown-chat deploy" >&2
        exit 1
      fi

      gcloud builds triggers run "${YOUROWN_CHAT_DEPLOY_TRIGGER_ID}" \
        --project="${TARGET_PROJECT_ID}" \
        --region="${CLOUDBUILD_REGION}" \
        --branch="${YOUROWN_CHAT_DEPLOY_BRANCH:-main}" \
        --substitutions="_IMAGE_TRIGGER_TAG=${pipeline_tag},_IMAGE_TRIGGER_PROJECT=pilprod/mattermost,_IMAGE_TRIGGER_REPO=https://github.com/pilprod/mattermost,_IMAGE_TRIGGER_SHORT_SHA=${PIPELINE_SHORT_SHA:-unknown-sha}"
    timeout: '1800s'

timeout: '3600s'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _PIPELINE_NAME: 'mattermost image'
  _CLOUDBUILD_REGION: 'southamerica-east1'
  _IMAGE_REPO: 'southamerica-east1-docker.pkg.dev/gcloud-production-1/mattermost/mattermost'
  _DEV_IMAGE_TAG: 'dev'
  _YOUROWN_CHAT_DEPLOY_TRIGGER_ID: 'yourown-chat-rke2-deploy'
  _YOUROWN_CHAT_DEPLOY_BRANCH: 'main'
